name: Update Homebrew tap

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to sync (e.g. v0.2.6)
        required: true

jobs:
  update-cask:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release info
        id: rel
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          version="${TAG#v}"
          dmg="ArtWall-${version}-macOS.dmg"
          url="https://github.com/${{ github.repository }}/releases/download/${TAG}/${dmg}"
          echo "tag=$TAG"          >> "$GITHUB_OUTPUT"
          echo "version=$version"  >> "$GITHUB_OUTPUT"
          echo "dmg=$dmg"          >> "$GITHUB_OUTPUT"
          echo "url=$url"          >> "$GITHUB_OUTPUT"

      - name: Download DMG and compute sha256
        id: hash
        run: |
          curl -fsSL -o release.dmg "${{ steps.rel.outputs.url }}"
          sha=$(sha256sum release.dmg | awk '{print $1}')
          echo "sha256=$sha" >> "$GITHUB_OUTPUT"

      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          repository: baileywickham/homebrew-tap
          token: ${{ secrets.TAP_REPO_TOKEN }}
          path: tap

      - name: Update cask
        working-directory: tap
        env:
          VERSION: ${{ steps.rel.outputs.version }}
          SHA256:  ${{ steps.hash.outputs.sha256 }}
        run: |
          cask=Casks/artwall.rb
          sed -i -E "s/^  version \".*\"/  version \"${VERSION}\"/"     "$cask"
          sed -i -E "s/^  sha256 \".*\"/  sha256 \"${SHA256}\"/"        "$cask"
          echo "--- updated cask ---"
          cat "$cask"

      - name: Commit and push
        working-directory: tap
        env:
          VERSION: ${{ steps.rel.outputs.version }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes — cask already at ${VERSION}"
            exit 0
          fi
          git add Casks/artwall.rb
          git commit -m "Update artwall cask to ${VERSION}"
          git push
